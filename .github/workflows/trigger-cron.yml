name: Trigger Cron Job

on:
  workflow_dispatch:
    inputs:
      vercel_deployment_url:
        description: 'Vercel deployment URL'
        required: false
        type: string
        default: 'https://oh-sdk-dashboard.vercel.app'

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Cron
        run: |
          curl -X POST "${{ inputs.vercel_deployment_url }}/api/cron/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
