name: Trigger Cron Job

on:
  workflow_dispatch:
    inputs:
      vercel_deployment_url:
        description: 'Vercel deployment URL (e.g., https://your-project.vercel.app)'
        required: true
        type: string

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Cron
        run: |
          curl -X GET "${{ inputs.vercel_deployment_url }}/api/cron/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
